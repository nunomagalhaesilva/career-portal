<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oportunidades Internas — Grupo MCoutinho</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a2030;color:#e8e8e8;padding:2rem 1.5rem;min-height:100vh}
.page{max-width:1100px;margin:0 auto}
.header{margin-bottom:1.5rem}
.header h1{font-size:24px;font-weight:600;color:#ffffff}
.header p{font-size:14px;color:#9aa0ac;margin-top:4px}
.top-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1.25rem}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9aa0ac;font-size:16px;pointer-events:none}
#search{width:100%;padding:8px 10px 8px 34px;font-size:14px;border-radius:8px;border:1px solid #2e3447;background:#252b3b;outline:none;color:#e8e8e8}
#search::placeholder{color:#9aa0ac}
#search:focus{border-color:#3e4560}
.filter-dropdown{position:relative}
.filter-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;font-size:13px;border-radius:8px;background:#252b3b;border:1px solid #2e3447;color:#e8e8e8;cursor:pointer;white-space:nowrap}
.filter-btn:hover{background:#2e3447}
.dropdown-menu{display:none;position:absolute;top:calc(100% + 6px);left:0;z-index:10;background:#252b3b;border:1px solid #2e3447;border-radius:8px;padding:6px;min-width:170px;box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.dropdown-menu.open{display:block}
.dropdown-menu label{display:flex;align-items:center;gap:8px;padding:5px 8px;font-size:13px;color:#e8e8e8;cursor:pointer;border-radius:6px;white-space:nowrap}
.dropdown-menu label:hover{background:#2e3447}
.dropdown-menu input[type=checkbox]{accent-color:#00fff8;width:14px;height:14px}
.counter{font-size:13px;color:#9aa0ac;margin-left:auto;padding:6px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.card{background:#252b3b;border:1px solid #2e3447;border-radius:12px;padding:1rem 1.1rem;display:flex;flex-direction:column;gap:10px;transition:border-color 0.15s}
.card:hover{border-color:#3e4560}
.card-title{font-size:15px;font-weight:600;color:#ffffff;line-height:1.3}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.tag-loc{background:transparent;border:1px solid #2e3447;color:#1a2d3d;background:#ffffff}
.tag-vn{background:#3b5bdb;color:#ffffff}
.tag-vo{background:#3b5bdb;color:#ffffff}
.tag-apv{background:#2f9e44;color:#ffffff}
.tag-col{background:#e67700;color:#ffffff}
.tag-rac{background:#a61e4d;color:#ffffff}
.tag-log{background:#6741d9;color:#ffffff}
.tag-csp{background:#0c8599;color:#ffffff}
.tag-pec{background:#6741d9;color:#ffffff}
.card-link{margin-top:auto;font-size:12px;color:#00fff8;text-decoration:none;display:flex;align-items:center;gap:4px;font-weight:600;letter-spacing:0.02em}
.card-link:hover{text-decoration:underline;text-underline-offset:3px}
.no-results{text-align:center;padding:3rem 0;color:#9aa0ac;font-size:14px}
.footer{margin-top:2rem;font-size:12px;color:#9aa0ac;text-align:center}
</style>
</head>

    <div class="filter-dropdown" id="fd-loc">

      <div class="dropdown-menu" id="dm-loc"></div>
    </div>
    <div class="filter-dropdown" id="fd-area">
      <button class="filter-btn" onclick="toggleDD('area')"><i class="ti ti-briefcase" style="font-size:15px"></i> Área <i class="ti ti-chevron-down" style="font-size:13px"></i></button>
      <div class="dropdown-menu" id="dm-area"></div>
    </div>
    <span class="counter" id="counter"></span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="no-results" id="no-results" style="display:none">
    <i class="ti ti-mood-sad" style="font-size:32px;display:block;margin-bottom:8px"></i>

const areaClass={
  "VN":"tag-vn","VO":"tag-vo","APV":"tag-apv","Colisão":"tag-col",
  "RAC":"tag-rac","Logística":"tag-log","CSP":"tag-csp","Peças":"tag-pec"
};

const locs=[...new Set(vagas.map(v=>v.l))].sort();
const areas=[...new Set(vagas.map(v=>v.a))].sort();
const dmLoc=document.getElementById('dm-loc');
const dmArea=document.getElementById('dm-area');

locs.forEach(l=>{
  const lb=document.createElement('label');
  lb.innerHTML=`<input type="checkbox" value="${l}" onchange="render()"> ${l}`;
  dmLoc.appendChild(lb);
});
areas.forEach(a=>{
  const lb=document.createElement('label');
  lb.innerHTML=`<input type="checkbox" value="${a}" onchange="render()"> ${a}`;
  dmArea.appendChild(lb);
});

function toggleDD(id){
  const menu=document.getElementById('dm-'+id);
  document.querySelectorAll('.dropdown-menu').forEach(m=>{if(m.id!=='dm-'+id)m.classList.remove('open');});
  menu.classList.toggle('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.filter-dropdown'))document.querySelectorAll('.dropdown-menu').forEach(m=>m.classList.remove('open'));
});
function getChecked(dmId){
  return [...document.querySelectorAll(`#${dmId} input:checked`)].map(i=>i.value);
}
function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const selLocs=getChecked('dm-loc');
  const selAreas=getChecked('dm-area');
  const grid=document.getElementById('grid');
  const noRes=document.getElementById('no-results');
  grid.innerHTML='';
  const filtered=vagas.filter(v=>{
    const matchQ=!q||v.f.toLowerCase().includes(q)||v.l.toLowerCase().includes(q)||v.a.toLowerCase().includes(q);
    const matchL=!selLocs.length||selLocs.includes(v.l);
    const matchA=!selAreas.length||selAreas.includes(v.a);
    return matchQ&&matchL&&matchA;
  });
  document.getElementById('counter').textContent=`${filtered.length} vaga${filtered.length!==1?'s':''}`;
  if(!filtered.length){noRes.style.display='block';return;}
  noRes.style.display='none';
  filtered.forEach(v=>{
    const ac=areaClass[v.a]||'tag-vn';
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`
      <div class="card-title">${v.f}</div>
      <div class="tags">
        <span class="tag tag-loc"><i class="ti ti-map-pin" style="font-size:11px"></i> ${v.l}</span>
        <span class="tag ${ac}">${v.a}</span>
      </div>
      <a class="card-link" href="${v.url}" target="_blank">Ver perfil <i class="ti ti-external-link" style="font-size:13px"></i></a>`;
    grid.appendChild(card);
  });
}
render();
document.getElementById('search').addEventListener('input',render);
